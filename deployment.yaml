apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-app
  template:
    metadata:
      labels:
        app: cloud-app
    spec:
      containers:
      - name: cloud-app
        image: cloud-app
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-service
spec:
  type: NodePort
  selector:
    app: cloud-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30007
      